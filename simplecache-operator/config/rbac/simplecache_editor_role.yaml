# This rule is not used by the project simplecache-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the cache.x1kun.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: simplecache-operator
    app.kubernetes.io/managed-by: kustomize
  name: simplecache-editor-role
rules:
- apiGroups:
  - cache.x1kun.com
  resources:
  - simplecaches
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cache.x1kun.com
  resources:
  - simplecaches/status
  verbs:
  - get
