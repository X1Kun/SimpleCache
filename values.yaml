apiVersion: v1
kind: ConfigMap
metadata:
  name: prom-config
  namespace: monitoring
data:
  prometheus.yml: |-
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'geecache'
        # 🔥 极其暴力的静态抓取：直接锁定你的 5 个 Pod！
        static_configs:
          - targets:
            - 'my-first-geecache-0.my-first-geecache-svc.default.svc.cluster.local:9999'
            - 'my-first-geecache-1.my-first-geecache-svc.default.svc.cluster.local:9999'
            - 'my-first-geecache-2.my-first-geecache-svc.default.svc.cluster.local:9999'
            - 'my-first-geecache-3.my-first-geecache-svc.default.svc.cluster.local:9999'
            - 'my-first-geecache-4.my-first-geecache-svc.default.svc.cluster.local:9999'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
      volumes:
        - name: config-volume
          configMap:
            name: prom-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.0.0
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
