---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - cache.x1kun.com
  resources:
  - simplecaches
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cache.x1kun.com
  resources:
  - simplecaches/finalizers
  verbs:
  - update
- apiGroups:
  - cache.x1kun.com
  resources:
  - simplecaches/status
  verbs:
  - get
  - patch
  - update
